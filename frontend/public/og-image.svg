<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f0e08"/>
      <stop offset="100%" stop-color="#0b0b0b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="200" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffd76a"/>
      <stop offset="55%"  stop-color="#c9a24a"/>
      <stop offset="100%" stop-color="#8a6a2f"/>
    </linearGradient>
    <linearGradient id="pill-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a24a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a24a" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Subtle grid lines -->
  <g stroke="#c9a24a" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow orb behind logo -->
  <circle cx="600" cy="220" r="180" fill="#c9a24a" fill-opacity="0.06"/>

  <!-- Logo mark (P + arrow), centred, scaled up -->
  <!-- Original viewBox 56×56, scaled to 140×140, centred at (600,220) → translate(530, 150) scale(2.5) -->
  <g transform="translate(530, 150) scale(2.5)" filter="url(#glow)">
    <defs>
      <linearGradient id="logo-gold" x1="8" y1="4" x2="50" y2="56" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="#ffd76a"/>
        <stop offset="55%"  stop-color="#c9a24a"/>
        <stop offset="100%" stop-color="#8a6a2f"/>
      </linearGradient>
    </defs>
    <path
      fill="url(#logo-gold)"
      fill-rule="evenodd"
      d="
        M 28,4
        L 46,22 L 36,22
        C 52,22 52,46 36,46
        L 36,52 L 20,52 L 20,22
        L 10,22 Z

        M 36,30 C 44,30 44,40 36,40 L 36,30 Z
      "
    />
  </g>

  <!-- Brand name -->
  <text
    x="600" y="440"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="72"
    font-weight="700"
    fill="#f5e6c0"
    text-anchor="middle"
    letter-spacing="-1"
  >Plivio</text>

  <!-- Tagline -->
  <text
    x="600" y="500"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="400"
    fill="#c9a24a"
    text-anchor="middle"
    letter-spacing="2"
  >GET PAID TO COMPLETE TASKS</text>

  <!-- Sub-tagline -->
  <text
    x="600" y="548"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="20"
    font-weight="400"
    fill="#8a7a5a"
    text-anchor="middle"
  >Earn real money · Withdraw to GCash · Free to join</text>

  <!-- Bottom border accent -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)"/>
</svg>
